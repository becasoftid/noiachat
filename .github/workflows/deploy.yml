name: Deploy NoiaChat to Droplet

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validar secretos de despliegue
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USERNAME: ${{ secrets.DROPLET_USERNAME }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT }}
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          missing=0

          for secret_name in DROPLET_HOST DROPLET_USERNAME DROPLET_PORT DROPLET_SSH_KEY; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::${secret_name} esta vacio o no definido"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Secretos de despliegue presentes"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -e

            APP_DIR=/var/www/noiachat
            cd "$APP_DIR"

            echo "🔹 Configurando git safe.directory"
            git config --global --add safe.directory "$APP_DIR"

            echo "🔹 Activando modo mantenimiento"
            php8.4 artisan down || true

            echo "🔹 Fetch y reset a remoto"
            git fetch origin main
            git reset --hard origin/main

            echo "🔹 Último commit desplegado:"
            git log -1 --oneline || true

            echo "🔹 Validando Composer"
            which composer
            composer --version

            echo "🔹 Dependencias PHP"
            php8.4 $(which composer) install --no-dev --optimize-autoloader

            echo "🔹 Migraciones"
            php8.4 artisan migrate --force

            echo "🔧 Frontend Build"
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            export NODE_ENV=production
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build

            echo "🔹 Limpiando caches"
            php8.4 artisan optimize:clear
            php8.4 artisan config:cache
            php8.4 artisan route:cache
            php8.4 artisan view:cache

            echo "🔹 Corrigiendo permisos"
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            echo "🔹 Reiniciando servicios"
            systemctl restart php8.4-fpm
            systemctl reload nginx

            echo "🔹 Desactivando modo mantenimiento"
            php8.4 artisan up

            echo "✅ Deploy completo de NoiaChat desde GitHub Actions 🚀"
